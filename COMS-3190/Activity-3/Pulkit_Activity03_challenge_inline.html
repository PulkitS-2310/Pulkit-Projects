

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inline CSS Example</title>
</head>
<body>

    <div style="background-color: #d0ebff; padding: 20px;">

        <p class="info">Student name: Pulkit Saxena</p>
        <p class="info">email: Pulkit@iastate.edu</p>
        <p class="info">date: Jan 30, 2026</p>

        <h1 style="font-size: 28px; color: red; text-align: center;">
            Inline CSS Heading
        </h1>

        <h2 style="font-size: 20px; color: purple; text-align: left;">
             Subheading
        </h2>

        <p style="font-size: 14px; color: darkblue; text-align: left;">
            I have styled this paragraph using inline CSS.
            Each element has its own style attribute.
        </p>
    </div>

</body>
</html>
