




<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Internal CSS Example</title>

    <style>
        .container {
            background-color: #fff9c4; 
            padding: 20px;
        }

        h1 {
            font-size: 30px;
            color: green;
            text-align: center;
        }

        h3 {
            font-size: 22px;
            color: darkgreen;
            text-align: center;
        }

        p {
            font-size: 15px;
            color: black;
            text-align: justify;
        }
    </style>

</head>
<body>

    <div class="container">

        <p class="info">Student name: Pulkit Saxena</p>
        <p class="info">email: Pulkit@iastate.edu</p>
        <p class="info">date: Jan 30, 2026</p>

        <h1>Internal CSS Heading</h1>
        <h3>Internal CSS Subheading</h3>
        <p>
            I have styled this paragraph using an internal stylesheet.
            All styles are defined inside the style tag.
        </p>
    </div>

</body>
</html>
